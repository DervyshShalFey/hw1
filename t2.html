<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            background-color:rgb(186, 194, 202);
            font-size: 60px;
            padding: 15px 30px;
            margin: 15px;
        }
        .red{
            color: red;
        }
        .black{
            color: black;
        }
    </style>
</head>
<body>
    <p style="font-size: 40px;">Player 1: </p>
    <span class="red">4♥</span>
    <span class="black">Q♠</span>
    <span class="red">A♦</span>
    <span class="black">10♣</span>
    <span class="red">7♥</span>
    <span class="red">K♦</span>

    <p style="font-size: 40px;">Player 2: </p>
    <span class="black">A♠</span>
    <span class="black">3♠</span>
    <span class="black">6♣</span>
    <span class="black">2♠</span>
    <span class="red">5♥</span>
    <span class="red">10♥</span>
</body>
</html>
